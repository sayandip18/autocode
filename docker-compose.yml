services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: autocode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres_checkpoint:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: checkpoints
    ports:
      - "5433:5432"
    volumes:
      - pgcheckdata:/var/lib/postgresql/data

volumes:
  pgdata:
  pgcheckdata:
